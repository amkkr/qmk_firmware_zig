name: Zig Tests

permissions:
  contents: read

on:
  push:
    branches:
    - master
    paths:
    - 'src/**'
    - 'build.zig'
    - 'build.zig.zon'
    - 'tools/**'
    - '.github/workflows/zig_test.yml'
  pull_request:
    paths:
    - 'src/**'
    - 'build.zig'
    - 'build.zig.zon'
    - 'tools/**'
    - '.github/workflows/zig_test.yml'

# PR 連発・push 連発時の冗長な run を抑制。
# PR では同一 ref への新 push で進行中の run をキャンセル、 push (master) では待機。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 注: 実機 flash テスト (zig build flash) はランナーに RP2040 が無いため CI 対象外。
# 本ワークフローはホストネイティブのユニットテストと RP2040 向けクロスコンパイル検証のみ実施。

env:
  ZIG_VERSION: 0.16.0

jobs:
  fmt:
    name: zig fmt --check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Zig
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Check formatting
      run: zig fmt --check src tools build.zig

  verify:
    name: verify (${{ matrix.os }})
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    # setup-zig は use-cache: true (デフォルト) で Zig global cache
    # (~/.cache/zig 等) を OS ごとに自動キャッシュする。 actions/cache
    # での重ねがけは冗長 + 干渉リスクのため使用しない。
    - name: Setup Zig
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      with:
        version: ${{ env.ZIG_VERSION }}

    # ローカル .zig-cache はリポジトリ固有のため自前で管理。
    # キーには runner.os / runner.arch / Zig version を含め、
    # 環境変更時に古い壊れた cache を復元しないようにする。
    - name: Cache Zig local cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .zig-cache
        key: ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}-local-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**', 'tools/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}-local-

    - name: Run verify (tests + RP2040 cross-compile)
      run: zig build verify
